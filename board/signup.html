<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — 현준의 사진 세상</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="../index.html" class="site-name" style="text-decoration:none;">현준의 사진 세상</a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">Gallery</a>
      <a href="index.html"    class="nav-link active">Board</a>
    </nav>
  </header>

  <!-- ── 회원가입 카드 ── -->
  <div class="login-outer">
    <div class="login-card">
      <h1 class="login-title">Sign Up</h1>

      <form class="login-form" id="signup-form">

        <div class="form-group">
          <label class="form-label" for="nickname">닉네임</label>
          <input
            class="form-input"
            id="nickname"
            type="text"
            placeholder="게시판에 표시될 이름 (2~20자)"
            maxlength="20"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input
            class="form-input"
            id="email"
            type="email"
            placeholder="example@email.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input
            class="form-input"
            id="password"
            type="password"
            placeholder="6자 이상 입력"
            autocomplete="new-password"
            minlength="6"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">비밀번호 확인</label>
          <input
            class="form-input"
            id="password-confirm"
            type="password"
            placeholder="비밀번호를 다시 입력"
            autocomplete="new-password"
            required
          >
        </div>

        <!-- 에러 메시지 -->
        <p id="error-msg" style="display:none; font-size:12px; color:var(--c-warning); text-align:center;"></p>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
          가입하기
        </button>

      </form>

      <p style="color:var(--gray-600); font-size:12px; margin-top:20px; text-align:center;">
        이미 계정이 있으신가요?
        <a href="login.html" style="color:var(--c-primary); text-decoration:none;">로그인</a>
      </p>
    </div>
  </div>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <span style="font-size:14px; color:var(--gray-500);">현준의 사진 세상</span>
    <span class="footer-sep">·</span>
    <span style="font-size:14px; color:var(--gray-500);">2025</span>
  </footer>

  <script src="js/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    // 이미 로그인 상태면 목록으로 이동
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) location.href = 'index.html';
    });

    document.getElementById('signup-form').addEventListener('submit', async e => {
      e.preventDefault();

      const btn      = document.getElementById('submit-btn');
      const errMsg   = document.getElementById('error-msg');
      const nickname = document.getElementById('nickname').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('password-confirm').value;

      errMsg.style.display = 'none';

      if (nickname.length < 2) {
        errMsg.textContent   = '닉네임을 2자 이상 입력해주세요.';
        errMsg.style.display = 'block';
        return;
      }

      // 비밀번호 일치 확인
      if (password !== confirm) {
        errMsg.textContent   = '비밀번호가 일치하지 않습니다.';
        errMsg.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = '가입 중...';

      const { error } = await db.auth.signUp({
        email, password,
        options: { data: { nickname } }
      });

      if (error) {
        const msg = error.message === 'User already registered'
          ? '이미 가입된 이메일입니다.'
          : '가입 중 오류가 발생했습니다. 다시 시도해주세요.';
        errMsg.textContent   = msg;
        errMsg.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = '가입하기';
      } else {
        location.href = 'login.html';
      }
    });
  </script>

</body>
</html>
