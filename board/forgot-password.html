<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 — 현준의 사진 세상</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="../index.html" class="site-name" style="text-decoration:none;">현준의 사진 세상</a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">Gallery</a>
      <a href="index.html"    class="nav-link active">Board</a>
    </nav>
  </header>

  <!-- ── 비밀번호 찾기 카드 ── -->
  <div class="login-outer">
    <div class="login-card">
      <h1 class="login-title">Forgot Password</h1>
      <p style="font-size:13px; color:var(--gray-500); text-align:center; margin-bottom:24px; line-height:1.6;">
        가입한 이메일을 입력하면<br>비밀번호 재설정 링크를 보내드립니다.
      </p>

      <form class="login-form" id="forgot-form">

        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input
            class="form-input"
            id="email"
            type="email"
            placeholder="example@email.com"
            autocomplete="email"
            required
          >
        </div>

        <!-- 메시지 -->
        <p id="success-msg" style="display:none; font-size:12px; color:var(--c-primary); text-align:center;"></p>
        <p id="error-msg"   style="display:none; font-size:12px; color:var(--c-warning); text-align:center;"></p>

        <button type="submit" id="submit-btn" class="btn btn-primary"
          style="width:100%; justify-content:center; padding:12px;">
          재설정 링크 보내기
        </button>

      </form>

      <p style="color:var(--gray-600); font-size:12px; margin-top:20px; text-align:center;">
        <a href="login.html" style="color:var(--c-primary); text-decoration:none;">로그인으로 돌아가기</a>
      </p>
    </div>
  </div>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <span style="font-size:14px; color:var(--gray-500);">현준의 사진 세상</span>
    <span class="footer-sep">·</span>
    <span style="font-size:14px; color:var(--gray-500);">2025</span>
  </footer>

  <script src="js/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn        = document.getElementById('submit-btn');
      const successMsg = document.getElementById('success-msg');
      const errMsg     = document.getElementById('error-msg');
      const email      = document.getElementById('email').value.trim();

      successMsg.style.display = 'none';
      errMsg.style.display     = 'none';
      btn.disabled    = true;
      btn.textContent = '전송 중...';

      const redirectTo = location.href.replace('forgot-password.html', 'reset-password.html');

      const { error } = await db.auth.resetPasswordForEmail(email, { redirectTo });

      btn.disabled    = false;
      btn.textContent = '재설정 링크 보내기';

      if (error) {
        errMsg.textContent   = '오류가 발생했습니다. 다시 시도해주세요.';
        errMsg.style.display = 'block';
      } else {
        successMsg.textContent   = `${email}로 재설정 링크를 보냈습니다. 메일함을 확인해주세요.`;
        successMsg.style.display = 'block';
        document.getElementById('email').value = '';
      }
    });
  </script>

</body>
</html>
