<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 — 현준의 사진 세상</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="../index.html" class="site-name" style="text-decoration:none;">현준의 사진 세상</a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">Gallery</a>
      <a href="index.html"    class="nav-link active">Board</a>
    </nav>
  </header>

  <!-- ── 비밀번호 재설정 카드 ── -->
  <div class="login-outer">
    <div class="login-card">
      <h1 class="login-title">Reset Password</h1>

      <!-- 토큰 유효성 검사 중 -->
      <p id="loading-msg" style="text-align:center; font-size:13px; color:var(--gray-500);">
        인증 중...
      </p>

      <!-- 유효하지 않은 링크 -->
      <div id="invalid-block" style="display:none; text-align:center;">
        <p style="font-size:13px; color:var(--c-warning); margin-bottom:16px;">
          유효하지 않거나 만료된 링크입니다.
        </p>
        <a href="forgot-password.html" class="btn btn-outline"
          style="justify-content:center;">다시 요청하기</a>
      </div>

      <!-- 새 비밀번호 폼 -->
      <form class="login-form" id="reset-form" style="display:none;">

        <div class="form-group">
          <label class="form-label" for="new-password">새 비밀번호</label>
          <input
            class="form-input"
            id="new-password"
            type="password"
            placeholder="6자 이상 입력"
            autocomplete="new-password"
            minlength="6"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">비밀번호 확인</label>
          <input
            class="form-input"
            id="confirm-password"
            type="password"
            placeholder="비밀번호를 다시 입력"
            autocomplete="new-password"
            required
          >
        </div>

        <p id="error-msg" style="display:none; font-size:12px; color:var(--c-warning); text-align:center;"></p>

        <button type="submit" id="submit-btn" class="btn btn-primary"
          style="width:100%; justify-content:center; padding:12px;">
          비밀번호 변경
        </button>

      </form>
    </div>
  </div>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <span style="font-size:14px; color:var(--gray-500);">현준의 사진 세상</span>
    <span class="footer-sep">·</span>
    <span style="font-size:14px; color:var(--gray-500);">2025</span>
  </footer>

  <script src="js/supabase.min.js"></script>
  <script src="../js/supabase.js"></script>
  <script>
    let recoveryReady = false;

    // Supabase가 URL 해시를 파싱해 PASSWORD_RECOVERY 이벤트를 발생시킴
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryReady = true;
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('reset-form').style.display  = '';
      }
    });

    // 3초 안에 이벤트가 없으면 유효하지 않은 링크로 판단
    setTimeout(() => {
      if (!recoveryReady) {
        document.getElementById('loading-msg').style.display  = 'none';
        document.getElementById('invalid-block').style.display = '';
      }
    }, 3000);

    document.getElementById('reset-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn      = document.getElementById('submit-btn');
      const errMsg   = document.getElementById('error-msg');
      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;

      errMsg.style.display = 'none';

      if (password !== confirm) {
        errMsg.textContent   = '비밀번호가 일치하지 않습니다.';
        errMsg.style.display = 'block';
        return;
      }

      btn.disabled    = true;
      btn.textContent = '변경 중...';

      const { error } = await db.auth.updateUser({ password });

      if (error) {
        errMsg.textContent   = '변경 중 오류가 발생했습니다. 다시 시도해주세요.';
        errMsg.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = '비밀번호 변경';
      } else {
        alert('비밀번호가 변경되었습니다. 새 비밀번호로 로그인해주세요.');
        await db.auth.signOut();
        location.href = 'login.html';
      }
    });
  </script>

</body>
</html>
