<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판 — 현준의 사진 세상</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="css/board.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="../index.html" class="site-name" style="text-decoration:none;">현준의 사진 세상</a>
    <nav class="site-nav">
      <a href="../index.html" class="nav-link">Gallery</a>
      <a href="index.html"    class="nav-link active">Board</a>
      <a href="login.html"    class="nav-link" id="nav-user">로그인</a>
    </nav>
  </header>

  <!-- ── 게시판 본문 ── -->
  <main class="board-container">

    <div class="board-page-header">
      <h1 class="board-page-title">Board</h1>
      <a href="write.html" class="btn btn-outline" id="btn-write" style="display:none;">글쓰기</a>
    </div>

    <!-- 검색 바 -->
    <div class="search-bar">
      <input type="search" class="form-input" id="search-input"
        placeholder="제목 또는 내용으로 검색..." style="flex:1;">
      <button type="button" class="btn btn-outline" id="search-btn">검색</button>
      <button type="button" class="btn btn-ghost" id="search-clear" style="display:none;">초기화</button>
    </div>

    <table class="board-table">
      <thead>
        <tr>
          <th class="col-num">번호</th>
          <th class="col-title">제목</th>
          <th class="col-author">등록자</th>
          <th class="col-date">등록일</th>
          <th class="col-views">조회</th>
        </tr>
      </thead>
      <tbody id="post-list">
        <!-- JS로 렌더링 -->
      </tbody>
    </table>

    <!-- 빈 상태 / 에러 -->
    <p id="empty-msg" style="display:none; text-align:center; padding:40px 0; font-size:14px; color:var(--gray-500);">
      등록된 글이 없습니다.
    </p>
    <p id="error-msg" style="display:none; text-align:center; padding:40px 0; font-size:14px; color:var(--c-warning);">
      목록을 불러오는 중 오류가 발생했습니다.
    </p>

    <!-- ── 페이지네이션 ── -->
    <nav class="pagination" id="pagination" aria-label="페이지 탐색"></nav>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <span style="font-size:14px; color:var(--gray-500);">현준의 사진 세상</span>
    <span class="footer-sep">·</span>
    <span style="font-size:14px; color:var(--gray-500);">2025</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const PAGE_SIZE = 10;
    let currentPage = 1;
    let currentQuery = '';

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(iso) {
      return iso ? iso.slice(0, 10) : '';
    }

    // 게시글 목록 렌더링
    function renderPosts(posts) {
      const tbody   = document.getElementById('post-list');
      const emptyEl = document.getElementById('empty-msg');

      if (!posts || posts.length === 0) {
        tbody.innerHTML      = '';
        emptyEl.style.display = 'block';
        return;
      }

      emptyEl.style.display = 'none';
      tbody.innerHTML = posts.map(post => {
        const commentCount = post.comments?.[0]?.count ?? 0;
        const badge = commentCount > 0
          ? `<span class="comment-badge">[${commentCount}]</span>`
          : '';
        return `
          <tr>
            <td class="col-num">${post.id}</td>
            <td class="col-title">
              <a class="post-link" href="board-detail.html?id=${post.id}">${escapeHtml(post.title)}</a>${badge}
            </td>
            <td class="col-author">${escapeHtml(post.nickname)}</td>
            <td class="col-date">${formatDate(post.created_at)}</td>
            <td class="col-views">${post.views ?? 0}</td>
          </tr>
        `;
      }).join('');
    }

    // 페이지네이션 렌더링
    function renderPagination(total, page) {
      const nav        = document.getElementById('pagination');
      const totalPages = Math.ceil(total / PAGE_SIZE);

      if (totalPages <= 1) { nav.innerHTML = ''; return; }

      const btns = [];

      // 이전
      btns.push(`<button class="page-btn" ${page === 1 ? 'disabled' : ''}
        onclick="loadPosts(${page - 1})">&#8592;</button>`);

      // 페이지 번호 (최대 10개 표시)
      const start = Math.max(1, page - 4);
      const end   = Math.min(totalPages, start + 9);
      for (let p = start; p <= end; p++) {
        btns.push(`<button class="page-btn ${p === page ? 'active' : ''}"
          onclick="loadPosts(${p})" ${p === page ? 'aria-current="page"' : ''}>${p}</button>`);
      }

      // 다음
      btns.push(`<button class="page-btn" ${page === totalPages ? 'disabled' : ''}
        onclick="loadPosts(${page + 1})">&#8594;</button>`);

      nav.innerHTML = btns.join('');
    }

    // 게시글 목록 조회
    async function loadPosts(page, query = currentQuery) {
      currentPage  = page;
      currentQuery = query;
      const from   = (page - 1) * PAGE_SIZE;
      const to     = from + PAGE_SIZE - 1;

      let q = db.from('posts')
        .select('id, title, nickname, created_at, views, comments(count)', { count: 'exact' });

      if (query) {
        q = q.or(`title.ilike.%${query}%,content.ilike.%${query}%`);
      }

      const { data, error, count } = await q
        .order('created_at', { ascending: false })
        .range(from, to);

      if (error) {
        document.getElementById('error-msg').style.display = 'block';
        console.error(error);
        return;
      }

      renderPosts(data);
      renderPagination(count, page);
    }

    // 검색
    document.getElementById('search-btn').addEventListener('click', () => {
      const q = document.getElementById('search-input').value.trim();
      document.getElementById('search-clear').style.display = q ? '' : 'none';
      loadPosts(1, q);
    });

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    document.getElementById('search-clear').addEventListener('click', () => {
      document.getElementById('search-input').value = '';
      document.getElementById('search-clear').style.display = 'none';
      loadPosts(1, '');
    });

    // 초기화
    async function init() {
      const session = await getOptionalSession();
      const navUser = document.getElementById('nav-user');
      const btnWrite = document.getElementById('btn-write');

      if (session) {
        // 로그인 상태: "로그아웃" 표시 + 글쓰기 버튼 표시
        btnWrite.style.display = '';
        initNav(session);
      } else {
        // 비로그인: "로그인" 링크 유지 (기본값)
        navUser.href = 'login.html';
      }

      await loadPosts(1);
    }

    init();
  </script>

</body>
</html>
