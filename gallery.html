<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현준의 사진 세상 — Gallery</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="index.html" class="site-name" style="text-decoration:none;">현준의 사진 세상</a>
    <nav class="site-nav">
      <a href="board/index.html" class="nav-link">Board</a>
    </nav>
  </header>

  <!-- ── 카테고리 바 ── -->
  <div class="cat-bar">
    <button class="cat-btn active" data-cat="all">전체</button>
    <button class="cat-btn" data-cat="travel">여행사진</button>
    <button class="cat-btn" data-cat="long-exposure">장노출</button>
    <button class="cat-btn" data-cat="trajectory">궤적사진</button>
    <button class="cat-btn" data-cat="typological">유형적</button>
    <button class="cat-btn" data-cat="series">연작시리즈</button>
    <button class="cat-btn" data-cat="recent">최근 작업</button>
  </div>

  <!-- ── 뷰어 (viewer-wrap: 스와이프 감지 / viewer-stage: 빈 상태 마운트) ── -->
  <div class="viewer-wrap">
    <button class="arrow arrow-prev" id="btn-prev" aria-label="이전">&#8592;</button>
    <div class="viewer-stage">
      <img class="main-photo" id="main-img" src="" alt="" draggable="false">
    </div>
    <button class="arrow arrow-next" id="btn-next" aria-label="다음">&#8594;</button>
  </div>

  <!-- ── 썸네일 스트립 ── -->
  <div class="strip-outer">
    <div class="strip-inner" id="strip"></div>
  </div>

  <!-- ── 메타 바 ── -->
  <div class="meta-bar">
    <div class="meta-left">
      <div class="meta-title" id="meta-title"></div>
      <div class="meta-sub"   id="meta-sub"></div>
    </div>
    <div class="meta-right" id="meta-exif"></div>
  </div>

  <!-- ── 전체 목록 토글 ── -->
  <div class="grid-toggle-wrap">
    <button class="grid-toggle-btn" id="btn-grid-toggle">전체 목록 보기</button>
  </div>

  <!-- ── 전체 목록 그리드 ── -->
  <section class="photo-grid" id="photo-grid"></section>

  <!-- ── 푸터 ── -->
  <footer class="site-footer">
    <span id="footer-name"></span>
    <span class="footer-sep">·</span>
    <span id="footer-year"></span>
  </footer>

  <script src="gallery.js"></script>
</body>
</html>
