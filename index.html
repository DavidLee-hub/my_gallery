<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현준의 사진 세상</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #0D1B2A;
    }

    /* 전체 화면 배경 */
    .intro-bg {
      position: fixed;
      inset: 0;
      background-image: url('img/long-exposure/빛의 바다.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #0D1B2A;
    }

    /* 어두운 오버레이 */
    .intro-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13, 27, 42, 0.45) 0%,
        rgba(13, 27, 42, 0.62) 100%
      );
    }

    /* 컨텐츠 중앙 배치 */
    .intro-content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 액센트 라인 */
    .intro-accent {
      width: 3px;
      height: 48px;
      background: #E8A848;
      border-radius: 2px;
      opacity: 0.9;
    }

    /* 사이트 이름 */
    .intro-title {
      text-align: center;
      color: #F8FBFC;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
    }

    .intro-title em {
      display: block;
      font-style: normal;
      font-size: clamp(12px, 1.8vw, 16px);
      font-weight: 400;
      letter-spacing: 0.42em;
      color: #D6E8EE;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: 0.85;
    }

    /* 갤러리 입장 버튼 */
    .intro-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      border: 1px solid rgba(248, 251, 252, 0.55);
      background: rgba(13, 27, 42, 0.35);
      color: #F8FBFC;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .intro-btn:hover {
      background: rgba(78, 139, 168, 0.55);
      border-color: rgba(232, 168, 72, 0.8);
      color: #fff;
    }

    .intro-btn-arrow {
      font-size: 16px;
      transition: transform 0.25s ease;
    }

    .intro-btn:hover .intro-btn-arrow {
      transform: translateX(4px);
    }

    /* 하단 힌트 텍스트 */
    .intro-footer {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(214, 232, 238, 0.45);
      z-index: 10;
    }

    @media (max-width: 640px) {
      .intro-content { gap: 28px; }
      .intro-accent  { height: 32px; }
      .intro-btn     { padding: 12px 28px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="intro-bg"></div>
  <div class="intro-overlay"></div>

  <main class="intro-content">
    <div class="intro-accent"></div>

    <h1 class="intro-title">
      현준의 사진 세상
      <em>Photography by Hyeonjun</em>
    </h1>

    <a class="intro-btn" href="gallery.html">
      갤러리 입장
      <span class="intro-btn-arrow">&#8594;</span>
    </a>
  </main>

  <p class="intro-footer">빛과 시간의 기록</p>
</body>
</html>
